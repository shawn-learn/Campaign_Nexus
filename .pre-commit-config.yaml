# Fast local gates mirroring CI. Install once: `uv run pre-commit install` (from backend/).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: bash -c 'cd backend && uv run mypy app'
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$

      - id: import-linter
        name: import-linter (module boundaries)
        entry: bash -c 'cd backend && uv run lint-imports'
        language: system
        pass_filenames: false
        files: ^backend/.*\.py$
