name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, types, boundaries, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy strict)
        run: uv run mypy app

      - name: Module boundaries (import-linter)
        run: uv run lint-imports

      - name: Tests
        run: uv run pytest

      - name: OpenAPI schema is up to date
        run: |
          uv run python -m scripts.export_openapi
          git diff --exit-code openapi.json \
            || (echo "::error::openapi.json is stale — run 'python -m scripts.export_openapi' and commit." && exit 1)

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test

      - name: Typed API client is up to date
        run: |
          npm run gen:api
          git diff --exit-code src/api/schema.d.ts \
            || (echo "::error::src/api/schema.d.ts is stale — run 'npm run gen:api' and commit." && exit 1)

      - name: Build
        run: npm run build
