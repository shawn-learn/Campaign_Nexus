[project]
name = "campaign-nexus"
version = "0.1.0"
description = "Campaign Nexus — Dungeon Master Operating System (backend)"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0.36",
    "alembic>=1.14",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "jsonschema>=4.26.0",
    "python-multipart>=0.0.32",
]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "httpx>=0.27",
    "ruff>=0.8",
    "mypy>=1.13",
    "import-linter>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py312"
src = ["app", "tests"]
# Autogenerated Alembic revisions are not hand-maintained.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "RUF"]

[tool.ruff.lint.per-file-ignores]
# FastAPI's dependency-injection idiom requires Depends()/Path() calls in arg defaults.
"**/router.py" = ["B008"]
"**/deps.py" = ["B008"]

# ---------------------------------------------------------------------------
# mypy (strict)
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
disallow_any_generics = true
plugins = ["pydantic.mypy"]
mypy_path = "."

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = ["jsonschema.*"]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

# ---------------------------------------------------------------------------
# import-linter — enforces the modular-monolith boundaries (ADR-001)
# ---------------------------------------------------------------------------
[tool.importlinter]
root_package = "app"

[[tool.importlinter.contracts]]
name = "Core is a leaf — it must not import feature modules"
type = "forbidden"
source_modules = ["app.core"]
forbidden_modules = ["app.modules"]

[[tool.importlinter.contracts]]
name = "Module layering — Campaign is the shared scoping context; siblings above are independent"
type = "layers"
containers = ["app.modules"]
layers = [
    # Story engine: the very top — it reaches down into quests (playbook), NPCs (npcs) and
    # flags to evaluate conditions and run consequences (FR-4).
    "story",
    # Orchestration layer: may call into the time + rules engines (rests, combat), mint
    # entities in the wiki (atlas, npcs) and read the chronicle (npcs: session spans).
    # Independent of each other (' | ').
    "playbook | atlas | npcs",
    # Independent sibling contexts (the ' | ' asserts they don't import each other).
    "wiki | chronicle | time",
    # Rules engine: depended on by the top contexts, depends only on campaign + core.
    "rules",
    # Bottom layer: Campaign — everything may depend on it (docs/04-domain-model.md).
    "campaign",
]
# Cross-context *reactions* go through the event bus, not direct imports; the only
# permitted direct imports are downward onto Campaign (scoping/identity).

[[tool.importlinter.contracts]]
name = "No game system is hardcoded — plugins are reached only via the rules registry"
type = "forbidden"
# Only direct imports are forbidden: reaching a plugin *through* the registry (the one
# module allowed to import them) is the whole point of the registry.
allow_indirect_imports = "true"
source_modules = [
    "app.core",
    "app.modules.campaign",
    "app.modules.wiki",
    "app.modules.chronicle",
    "app.modules.time",
    "app.modules.playbook",
    "app.modules.npcs",
    "app.modules.story",
]
forbidden_modules = ["app.modules.rules.systems"]
# e.g. an `app.modules.rules.systems.dnd5e` import anywhere but the registry fails CI (§10.8).
